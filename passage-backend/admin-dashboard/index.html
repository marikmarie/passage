<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PASSAGE | Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Strict scroll elimination */
    }

    .photo-panel {
      position: relative;
      overflow: hidden;
    }

    .photo-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top,
          rgba(15, 23, 42, 0.55) 0%,
          rgba(15, 23, 42, 0.15) 40%,
          transparent 100%);
    }

    .photo-badge {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      right: 2rem;
    }

    .input-field {
      transition: border-color .25s, box-shadow .25s, background-color .25s;
    }

    .input-field:focus {
      border-color: #00bf63;
      box-shadow: 0 0 0 4px rgba(0, 191, 99, 0.12);
      outline: none;
    }

    @keyframes shine {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    .btn-shine {
      position: relative;
      overflow: hidden;
    }

    .btn-shine::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, .25), transparent);
      animation: shine 2.8s ease-in-out infinite;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up {
      animation: fadeUp .6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .fade-up-1 { animation-delay: .05s; }
    .fade-up-2 { animation-delay: .12s; }
    .fade-up-3 { animation-delay: .19s; }
    .fade-up-4 { animation-delay: .26s; }
    .fade-up-5 { animation-delay: .33s; }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-32px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .slide-left {
      animation: slideInLeft .75s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 9999px;
      padding: .35rem .85rem;
      color: #fff;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: 0.025em;
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00bf63;
      box-shadow: 0 0 8px #00bf63;
    }
  </style>
</head>

<body class="bg-slate-50 h-screen flex items-center justify-center p-4 sm:p-6 md:p-8 overflow-hidden">

  <div class="w-full max-w-6xl h-full max-h-[720px] flex rounded-[28px] overflow-hidden bg-white shadow-2xl shadow-slate-900/10">

    <div class="photo-panel hidden md:flex md:w-3/5 relative h-full slide-left">
      <img src="assets/img/passage.png" alt="PASSAGE – safe school transport in Kampala">
      <div class="photo-overlay"></div>

      <div class="absolute top-8 left-8 flex items-center gap-2.5">
        <div class="w-8 h-8 bg-[#00bf63] rounded-lg flex items-center justify-center shadow-md">
          <span class="text-white font-black text-base">P</span>
        </div>
        <span class="text-white font-extrabold text-xl tracking-wider">PASSAGE</span>
      </div>

      <div class="photo-badge">
        <div class="bg-slate-900/40 backdrop-blur-md border border-white/10 rounded-2xl p-5 shadow-xl">
          <div class="flex items-center gap-2 mb-3">
            <span class="pill"><span class="pill-dot"></span>Match Confirmed</span>
            <span class="pill">🛡 Safe Route</span>
          </div>
          <h2 class="text-white font-bold text-lg leading-snug tracking-tight">
            Safe, verified transport for every school child.
          </h2>
          <p class="text-slate-200 text-sm mt-1.5 font-medium opacity-90">
            Connecting families with trusted drivers across Kampala.
          </p>
        </div>
      </div>
    </div>

    <div class="w-full md:w-2/5 bg-white flex flex-col justify-between items-center px-8 py-10 sm:px-12 lg:px-16 h-full overflow-hidden">
      
      <div class="hidden sm:block"></div>

      <div class="w-full max-w-sm my-auto">

        <div class="text-center mb-8 fade-up fade-up-1">
          <h1 class="text-4xl font-black text-slate-900 tracking-tight">PASSAGE</h1>
          <p class="text-sm text-[#5f6688] mt-2 font-bold uppercase tracking-wider text-[11px]">Secure Admin Portal</p>
        </div>

        <div id="errorAlert" class="hidden mb-5 p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-sm font-semibold text-center shadow-sm">
          Invalid credentials. Please try again.
        </div>

        <form id="loginForm" class="space-y-5">

          <div class="fade-up fade-up-2">
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Email / Username</label>
            <input type="email" id="email"
              class="input-field w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-900 placeholder-slate-400 text-sm bg-slate-50 focus:bg-white"
              placeholder="christine@passage.com" value="christine@passage.com" required>
          </div>

          <div class="fade-up fade-up-3">
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Password</label>
            <div class="relative">
              <input type="password" id="password"
                class="input-field w-full px-4 py-3 pr-12 rounded-xl border border-slate-200 text-slate-900 placeholder-slate-400 text-sm bg-slate-50 focus:bg-white"
                placeholder="••••••••" value="admin123" required>
              <button type="button" id="togglePw"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-[#00bf63] transition-colors duration-200"
                tabindex="-1">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between fade-up fade-up-4 pt-1">
            <label class="flex items-center gap-2.5 cursor-pointer select-none">
              <input type="checkbox" id="rememberMe" class="w-4 h-4 text-[#00bf63] border-slate-300 rounded focus:ring-[#00bf63] accent-[#00bf63]">
              <span class="text-sm text-slate-600 font-medium">Remember me</span>
            </label>
            <a href="#" class="text-sm text-[#00bf63] font-bold hover:text-[#009950] transition-colors duration-200">Forgot password?</a>
          </div>

          <div class="fade-up fade-up-5 pt-2">
            <button type="submit"
              class="btn-shine w-full bg-gradient-to-r from-[#00bf63] to-[#009950] hover:shadow-xl hover:shadow-emerald-500/20 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-emerald-500/10 transition-all duration-300 text-sm tracking-wide transform active:scale-[0.99]">
              Sign In to Passage
            </button>
          </div>
        </form>

      </div>

      <p class="text-center text-slate-400 text-xs font-medium fade-up fade-up-5 mt-auto">
        &copy; 2026 Cissy Technologies. All rights reserved.
      </p>
    </div>
  </div>

  <script>
    // Password Fields Display Controller
    const toggleBtn = document.getElementById('togglePw');
    const pwInput = document.getElementById('password');
    const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
    const eyeClosed = `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.293-3.95M9.88 9.88A3 3 0 0114.12 14.12M3 3l18 18"/></svg>`;
    
    toggleBtn.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      toggleBtn.innerHTML = isText ? eyeOpen : eyeClosed;
    });

    // Verification Routing Logic
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Updated to match your custom default values comfortably
      if ((email === 'christine@passage.com' || email === 'admin@passage.com') && password === 'admin123') {
        localStorage.setItem('admin_token', 'passage_admin_token_' + Date.now());
        window.location.href = './dashboard.html';
      } else {
        const alert = document.getElementById('errorAlert');
        alert.classList.remove('hidden');
        setTimeout(() => alert.classList.add('hidden'), 4000);
      }
    });

    // Fixed Development Token Router to avoid missing local destination crashes
    if (localStorage.getItem('admin_token') && window.location.pathname.includes('dashboard.html')) {
       // Only loops if target location is validly hosted
    }
  </script>
</body>

</html>
